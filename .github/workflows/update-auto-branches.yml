# This workflow automatically updates experimental branches to keep them up to date with:
#
# * the latest code on the `main` branch, and
# * their dependencies (which might be e.g. Git repositories or otherwise patched).
#
# The manually created experimental branches are named `next/*`.
# Their automatically-managed parallel branches are named `next-auto/*`.
# Each `next-auto/<name>` contains `next/<name>` rebased onto main, then a lockfile update.
#
# In the event that the automatic rebase starts failing, or a maintainer wishes to accept the
# automated changes, they can reset `next/<name>` to be equal to `next-auto/<name>`.

name: Update next-auto Branches

permissions:
  contents: read

on:
  workflow_dispatch:
  # TODO: enable schedule when bugs are fixed
  # schedule:
  #   - cron: '43 14 * * 1'

jobs:
  # Find all the branches that curretly exist and are named "next/*".
  find-branches:
    runs-on: ubuntu-latest
    outputs:
      nextnamesjson: ${{ steps.list.outputs.nextnamesjson }} 
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0 # supposedly will fetch all branches. TODO: we really only need to list them, and this might be better as a GitHub API call?
    - id: list
      # For each ref in refs/foo, put "foo" in a JSON array
      run: |
        echo "nextnamesjson=$(git for-each-ref --format='%(refname:lstrip=4)' 'refs/remotes/origin/next/*' | jq --raw-input --null-input --compact-output '[inputs]')" >> "$GITHUB_OUTPUT"

  update:
    # TODO: enable this when we enable pushing
    # permissions:
    #   contents: write
    runs-on: ubuntu-latest
    needs: find-branches
    strategy:
      fail-fast: false
      matrix:
        nextname: ${{ fromJson(needs.find-branches.outputs.nextnamesjson) }}
    steps:
    - uses: actions/checkout@v6
      with:
        ref: "next/${{ matrix.nextname }}"
        fetch-depth: 0 # need branches to perform rebase
    
    - name: Configure git
      run: |
        # These specific values are not required, but recommended.
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
    
    - name: Rebase and update
      run: |
        if git rebase origin/main; then
          echo 'Rebased without conflict. Updates will be a second commit.'
          
          # Note that this doesn’t take care of updating to new incompatible versions, which would be ideal;
          # but in most cases, we’ll have patched in `git` or similar anyway.
          # We're using `cargo update` instead of `xtask` to avoid needing to compile xtask.
          cargo update
          (cd all-is-cubes-wasm && cargo update)
          (cd fuzz && cargo update)

          git commit --allow-empty --message='Deps: Update to latest for experimental branch.' Cargo.lock "*/Cargo.lock"

        else
          echo 'Rebased with conflict. Regenerating lockfiles.'
          # A conflict occured in the rebase. It's likely to be the lockfiles. Regenerate them from scratch.
          cargo generate-lockfile
          (cd all-is-cubes-wasm && cargo generate-lockfile)
          (cd fuzz && cargo generate-lockfile)

          git add "Cargo.lock" "*/Cargo.lock"

          # This will fail if there are still merge conflicts unrelated to the lockfiles.
          echo 'Attempting to continue rebase.'
          EDITOR=true git rebase --continue
        fi
    
    - name: Show log
      run: git log --patch origin/main..

    - name: Push
      env:
        NEXTNAME: "${{ matrix.nextname }}"
      run: |
        # TODO: make this actually take effect (remove "echo"), and make it --force, when the rest of the logic is confirmed working
        echo git push origin "HEAD:next-auto/$NEXTNAME"
